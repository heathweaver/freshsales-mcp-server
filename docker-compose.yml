services:
  freshsales-mcp-server-http:
    build: .
    container_name: freshsales-mcp-server-http
    ports:
      - "8768:8768"
    environment:
      - FRESHSALES_API_KEY=${FRESHSALES_API_KEY}
      - FRESHSALES_SUBDOMAIN=${FRESHSALES_SUBDOMAIN}
      - MCP_ALLOWED_TOKENS=${MCP_ALLOWED_TOKENS}
    volumes:
      - cloudflared-certs:/root/.cloudflared
      - oauth-state:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('OK')"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  cloudflared-certs:
  oauth-state:
